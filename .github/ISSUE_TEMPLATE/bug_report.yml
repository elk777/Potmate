name: Bug report
description: Report a Potmate problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough details for us to reproduce it.
  - type: input
    id: version
    attributes:
      label: Potmate version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Installer package
      placeholder: "dmg / msi / exe / AppImage / deb / rpm"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open Potmate\n2. Click ...\n3. See ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: Drag screenshots here if this is a UI or installation issue.
