name: Question
description: Ask a usage or installation question
title: "[Question]: "
labels: ["question"]
body:
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Installation
        - Permissions
        - Daily records
        - Growth behavior
        - Backup and restore
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      placeholder: "What would you like to know?"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "macOS / Windows / Linux"
