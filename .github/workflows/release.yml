name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to rebuild, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            rustTarget: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
          - name: macOS Intel
            platform: macos-latest
            rustTarget: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,dmg
          - name: Windows x64
            platform: windows-latest
            rustTarget: x86_64-pc-windows-msvc
            args: --bundles msi,nsis
          - name: Linux x64
            platform: ubuntu-22.04
            rustTarget: x86_64-unknown-linux-gnu
            args: --bundles appimage,deb,rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Generate release body
        id: release_body
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          VERSION="${VERSION#V}"
          echo "title=Potmate V${VERSION}" >> "$GITHUB_OUTPUT"
          node scripts/generate-release-body.mjs "$RELEASE_TAG" > release-body.md
          {
            echo "body<<RELEASE_BODY_EOF"
            cat release-body.md
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ steps.release_body.outputs.title }}
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, 'alpha') || contains(env.RELEASE_TAG, 'beta') || contains(env.RELEASE_TAG, 'rc') }}
          args: ${{ matrix.args }}
          releaseBody: ${{ steps.release_body.outputs.body }}
